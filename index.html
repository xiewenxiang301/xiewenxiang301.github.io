<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCDN 业务单价查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .title {
            text-align: center;
            color: #2d3748;
            margin: 20px 0;
            font-size: 24px;
        }

        .search-box {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }

        .search-box:focus {
            border-color: #1890ff;
        }

        .price-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .business-name {
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 12px;
        }

        .price-row {
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }

        .price-item {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .mobile {
            background-color: #e6f7ff;
            color: #1890ff;
        }

        .unicom {
            background-color: #f0f2f5;
            color: #333;
        }

        .price-label {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .price-value {
            font-size: 20px;
            font-weight: bold;
        }

        .empty-hint {
            text-align: center;
            color: #999;
            padding: 30px 0;
        }

        .tips {
            text-align: center;
            color: #999;
            margin-top: 30px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1 class="title">PCDN 业务单价查询</h1>

    <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索业务名称...">

    <div id="priceList"></div>
    <div class="tips">内部使用 · 禁止外传</div>

<script>
    // 【价格数据】在这里修改即可
    const PRICE_DATA = [
    { name: "聚宝盆", mobile: 2400, unicom: 2700 },
    { name: "汇丰源", mobile: 2650, unicom: 2800 },
    { name: "定向m", mobile: 3100, unicom: 3100 },
    { name: "短J4", mobile: 2300, unicom: 2600 },
    { name: "幸运赚", mobile: 2400, unicom: 2800 },
    { name: "闲时专享", mobile: 1800, unicom: 2400 },
    { name: "长G3", mobile: 700, unicom: 800 },
    { name: "招财喵", mobile: 1800, unicom: 2500 },
    { name: "金满贯", mobile: 2600, unicom: 3100 },
    { name: "定向J", mobile: 3300, unicom: 3300 },
    { name: "定向J3", mobile: 3300, unicom: 3600 },
    { name: "sa", mobile: 1800, unicom: 2500 },
    { name: "sa2", mobile: 2000, unicom: 2500 },
    { name: "nat4专享", mobile: 2000, unicom: 2500 },
    { name: "短a", mobile: 2400, unicom: 2800 },
    { name: "短e", mobile: 2400, unicom: 2800 },
    { name: "t1", mobile: 2600, unicom: 2800 },
    { name: "t2", mobile: 2600, unicom: 2800 },
    { name: "t4", mobile: 2600, unicom: 2800 },
    { name: "短j", mobile: 1800, unicom: 2500 },
    { name: "长c", mobile: 1800, unicom: 2500 },
    { name: "短d", mobile: 1800, unicom: 2500 },
    { name: "短x", mobile: 1800, unicom: 2500 },
    { name: "短y2", mobile: 1800, unicom: 2500 },
    { name: "短a专线", mobile: 3000, unicom: 3400 },
    { name: "长q专线", mobile: 3000, unicom: 3400 },
    { name: "长z专线", mobile: 2800, unicom: 3400 },
    { name: "长z1专线", mobile: 3200, unicom: 3700 },
    { name: "长j专线", mobile: 2800, unicom: 3400 },
    { name: "长e专线", mobile: 2800, unicom: 3400 },
    { name: "长y1专线", mobile: 2800, unicom: 3000 },
    { name: "长m专线", mobile: 2800, unicom: 3000 },
    { name: "长q4", mobile: 2400, unicom: 2800 },
    { name: "长a", mobile: 2200, unicom: 2800 },
    { name: "短z", mobile: 2400, unicom: 2700 },
    { name: "短c", mobile: 2400, unicom: 2700 },
    { name: "长b", mobile: 2600, unicom: 2800 },
    { name: "短b", mobile: 2200, unicom: 2800 },
    { name: "短b3", mobile: 2400, unicom: 2800 },
    { name: "长w", mobile: 2400, unicom: 2800 },
    { name: "短y", mobile: 2400, unicom: 2800 },
    { name: "长y3", mobile: 2200, unicom: 2800 },
    { name: "短m", mobile: 2200, unicom: 2800 },
    { name: "短k6", mobile: 2200, unicom: 2800 },
    { name: "短k3", mobile: 2200, unicom: 2800 },
    { name: "短k9", mobile: 2200, unicom: 2800 },
    { name: "短k8", mobile: 2000, unicom: 2400 },
    { name: "短k14", mobile: 2000, unicom: 2400 }
    ];

    let displayData = JSON.parse(JSON.stringify(PRICE_DATA));
    const priceListEl = document.getElementById('priceList');
    const searchInput = document.getElementById('searchInput');

    // 渲染列表
    function renderList(data) {
        if (!data || data.length === 0) {
            priceListEl.innerHTML = '<div class="empty-hint">暂无匹配的业务</div>';
            return;
        }
        let html = '';
        data.forEach(item => {
            html += `
            <div class="price-card">
                <div class="business-name">${item.name}</div>
                <div class="price-row">
                    <div class="price-item mobile">
                        <div class="price-label">移动</div>
                        <div class="price-value">${item.mobile} 元</div>
                    </div>
                    <div class="price-item unicom">
                        <div class="price-label">电联</div>
                        <div class="price-value">${item.unicom} 元</div>
                    </div>
                </div>
            </div>`;
        });
        priceListEl.innerHTML = html;
    }

    // 搜索
    searchInput.addEventListener('input', () => {
        const key = searchInput.value.trim().toLowerCase();
        const result = displayData.filter(item => item.name.toLowerCase().includes(key));
        renderList(result);
    });

    // 初始化
    window.onload = function() {
        renderList(displayData);
    }
</script>
</body>
</html>
